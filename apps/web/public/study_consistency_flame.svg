<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Definition of gradients -->
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="50%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Calendar Card Background -->
  <rect x="10" y="10" width="180" height="180" rx="24" fill="#ffffff" fill-opacity="0.9" stroke="rgba(249, 115, 22, 0.15)" stroke-width="2" />
  
  <!-- Grid Lines for Calendar -->
  <line x1="20" y1="65" x2="180" y2="65" stroke="rgba(226, 232, 240, 0.8)" stroke-width="2" />
  <line x1="20" y1="105" x2="180" y2="105" stroke="rgba(226, 232, 240, 0.8)" stroke-width="2" />
  <line x1="20" y1="145" x2="180" y2="145" stroke="rgba(226, 232, 240, 0.8)" stroke-width="2" />
  
  <line x1="60" y1="35" x2="60" y2="175" stroke="rgba(226, 232, 240, 0.8)" stroke-width="1.5" />
  <line x1="100" y1="35" x2="100" y2="175" stroke="rgba(226, 232, 240, 0.8)" stroke-width="1.5" />
  <line x1="140" y1="35" x2="140" y2="175" stroke="rgba(226, 232, 240, 0.8)" stroke-width="1.5" />

  <!-- Calendar Checkmarks -->
  <!-- Check 1 -->
  <path d="M 35 85 L 42 92 L 53 81" fill="none" stroke="#f97316" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Check 2 -->
  <path d="M 75 85 L 82 92 L 93 81" fill="none" stroke="#f97316" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Check 3 -->
  <path d="M 35 125 L 42 132 L 53 121" fill="none" stroke="#f97316" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Flame (consistency) in center-right, glowing -->
  <g filter="url(#glow)" transform="translate(45, 30)">
    <path d="M 50 125 C 20 125, 15 95, 30 75 C 15 75, 10 50, 45 10 C 35 35, 45 45, 45 55 C 55 35, 75 25, 75 55 C 75 85, 75 125, 50 125 Z" fill="url(#flameGrad)" />
    <!-- Inner bright core -->
    <path d="M 50 115 C 32 115, 29 97, 38 85 C 29 85, 26 68, 47 40 C 41 57, 47 64, 47 70 C 53 57, 65 50, 65 70 C 65 90, 65 115, 50 115 Z" fill="#fef08a" opacity="0.8" />
  </g>
</svg>
