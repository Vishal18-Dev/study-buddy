<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Definitions for gradients/shadows -->
  <defs>
    <linearGradient id="laptopGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background decorative shapes -->
  <circle cx="400" cy="300" r="280" fill="currentColor" style="color: rgba(99, 102, 241, 0.05)" />
  <circle cx="600" cy="180" r="100" fill="currentColor" style="color: rgba(6, 182, 212, 0.05)" />

  <!-- Dotted path for habit tracking / connection -->
  <path d="M 150 400 C 150 150, 650 150, 650 400" fill="none" stroke="currentColor" style="color: rgba(99, 102, 241, 0.2)" stroke-width="4" stroke-dasharray="8 8" />
  <path d="M 250 350 C 250 200, 550 200, 550 350" fill="none" stroke="currentColor" style="color: rgba(6, 182, 212, 0.2)" stroke-width="3" stroke-dasharray="6 6" />

  <!-- Ground / Desk Line -->
  <line x1="100" y1="480" x2="700" y2="480" stroke="currentColor" style="color: rgba(148, 163, 184, 0.3)" stroke-width="6" stroke-linecap="round" />

  <!-- Stack of Books (left side) -->
  <g transform="translate(140, 360)">
    <!-- Book 1 (bottom) -->
    <rect x="0" y="80" width="160" height="40" rx="6" fill="#4f46e5" />
    <rect x="140" y="85" width="20" height="30" rx="3" fill="#ffffff" />
    
    <!-- Book 2 (middle) -->
    <rect x="10" y="45" width="140" height="35" rx="5" fill="#06b6d4" />
    <rect x="125" y="49" width="15" height="27" rx="3" fill="#ffffff" />

    <!-- Book 3 (top) -->
    <rect x="25" y="15" width="110" height="30" rx="4" fill="#f59e0b" />
    <rect x="110" y="18" width="15" height="24" rx="2" fill="#ffffff" />
  </g>

  <!-- Laptop (center) -->
  <g transform="translate(320, 260)" filter="url(#dropShadow)">
    <!-- Laptop screen border -->
    <rect x="0" y="0" width="240" height="160" rx="12" fill="#1e293b" stroke="currentColor" style="color: rgba(148, 163, 184, 0.5)" stroke-width="4" />
    <!-- Screen contents -->
    <rect x="10" y="10" width="220" height="140" rx="8" fill="url(#laptopGrad)" />
    
    <!-- Dashboard charts mockup in SVG -->
    <!-- Calendar grid representation -->
    <rect x="25" y="25" width="80" height="60" rx="6" fill="#ffffff" fill-opacity="0.15" />
    <line x1="35" y1="45" x2="95" y2="45" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
    <line x1="35" y1="65" x2="95" y2="65" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
    
    <!-- Progress circle representation -->
    <circle cx="165" cy="55" r="22" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="4" />
    <path d="M 165 33 A 22 22 0 1 1 143 55" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
    <circle cx="165" cy="55" r="8" fill="#ffffff" />
    
    <!-- Graph lines -->
    <path d="M 25 115 L 75 105 L 125 125 L 175 95 L 215 110" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <circle cx="175" cy="95" r="4" fill="#ffffff" />

    <!-- Laptop base -->
    <path d="M -30 160 L 270 160 L 250 176 L -10 176 Z" fill="#64748b" />
    <rect x="100" y="166" width="40" height="6" rx="3" fill="#475569" />
  </g>

  <!-- Potted Plant (right side) -->
  <g transform="translate(580, 370)">
    <!-- Pot -->
    <path d="M 10 70 L 50 70 L 45 110 L 15 110 Z" fill="#cbd5e1" stroke="currentColor" style="color: rgba(148, 163, 184, 0.4)" stroke-width="3" />
    <!-- Stems & Leaves -->
    <!-- Left Leaf -->
    <path d="M 20 70 C 5 40, -10 30, -5 10 C 15 20, 20 40, 25 70" fill="#10b981" />
    <!-- Center Leaf -->
    <path d="M 30 70 C 30 35, 30 15, 40 0 C 45 20, 40 40, 35 70" fill="#059669" />
    <!-- Right Leaf -->
    <path d="M 40 70 C 55 45, 65 35, 60 15 C 45 25, 42 45, 38 70" fill="#10b981" />
  </g>

  <!-- Floating Star Icon (Consistency) -->
  <g transform="translate(540, 130) scale(1.5)" fill="#f59e0b">
    <path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.787 1.4 8.168L12 18.896l-7.334 3.857 1.4-8.168L.132 9.21l8.2-1.192z" />
  </g>

  <!-- Floating Sparkle Icon (AI Generation) -->
  <g transform="translate(200, 160) scale(1.3)" fill="#4f46e5">
    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14l-5-4.87 6.91-1.01L12 2z" />
  </g>

  <!-- Floating Idea/Lightbulb Icon -->
  <g transform="translate(380, 80)" fill="#eab308">
    <!-- Bulb outline -->
    <circle cx="20" cy="20" r="14" fill="#ffffff" fill-opacity="0.9" stroke="#eab308" stroke-width="3" />
    <path d="M 14 31 L 26 31 L 24 37 L 16 37 Z" fill="#eab308" />
    <!-- Glow rays -->
    <line x1="20" y1="2" x2="20" y2="5" stroke="#eab308" stroke-width="2" stroke-linecap="round" />
    <line x1="7" y1="7" x2="9" y2="9" stroke="#eab308" stroke-width="2" stroke-linecap="round" />
    <line x1="33" y1="7" x2="31" y2="9" stroke="#eab308" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>
